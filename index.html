    <title>প্রবাসী সেবা — কম্বোডিয়ায় বাংলাদেশিদের বিশ্বস্ত সঙ্গী</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@themify/themify-icons@1.0.1/css/themify-icons.css" />

    <meta name="mobile-web-app-capable" content="yes">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Clear old service worker registrations & caches to fix Vercel bundle mismatch rendering a white screen
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then((registrations) => {
          for (let registration of registrations) {
            registration.unregister().then(() => {
              console.log('Service Worker unregistered successfully');
            });
          }
        });
      }
      if ('caches' in window) {
        caches.keys().then((names) => {
          for (let name of names) {
            caches.delete(name);
          }
        });
      }
    </script>
  </body>
</html>
